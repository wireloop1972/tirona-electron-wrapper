appId: com.tirona.electronwrapper
productName: Tirona
copyright: Copyright © 2025

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - config.json
  - package.json
  - steam_appid.txt
  - src/splash.html
  - assets/**/*

# Chatterbox Turbo TTS server (Portable Mode – bundled Python + deps)
# Build with:  npm run setup:tts
extraResources:
  - from: tts-server
    to: tts-server
    filter:
      - "**/*"
      - "!.git/**"
      - "!__pycache__/**"
      - "!tests/**"
      - "!.github/**"
  # Pre-downloaded game assets (GLBs, HDRIs, textures).
  # Build with:  npm run download:assets
  - from: asset-pack
    to: asset-pack
    filter:
      - "**/*"
  # Static assets from the Next.js public/ folder (PBR textures, HDRIs).
  # Build with:  npm run copy:static
  - from: static-pack
    to: static-pack
    filter:
      - "**/*"

# Windows configuration
win:
  target:
    - target: dir
      arch:
        - x64
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ${productName}

# macOS configuration
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icon.icns
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: null
  entitlementsInherit: null

dmg:
  title: ${productName} ${version}
  icon: assets/icon.icns
  background: null
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

compression: normal

# GitHub Releases publish – disabled for Steam builds.
